<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="checkm8" />
    <link rel="manifest" href="/manifest.json" />
    <title>checkm8</title>
    <script>
      // Apply dark mode class immediately to prevent white flash
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <style>
      /* Inline critical styles to prevent flash */
      html { background-color: #ffffff; }
      html.dark { background-color: #030712; }
      html.dark body { background-color: #030712; }
      html:not(.dark) body { background-color: #ffffff; }
      #root:empty::after {
        content: '';
        display: block;
        width: 24px;
        height: 24px;
        margin: 40vh auto;
        border: 3px solid rgba(128,128,128,0.2);
        border-top-color: rgba(128,128,128,0.6);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Unregister any existing service workers — they cause disruptive reloads
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
    </script>
  </body>
</html>
